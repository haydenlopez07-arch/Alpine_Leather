<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | Alpine Leather</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../forms.css">
</head>
<body>

<header>
  <h1>Alpine Leather</h1>
</header>

<main class="hero">
  <h2>Create Your Account</h2>
  <p>Join us to access orders, profiles, and exclusive products.</p>

  <form id="signupForm" class="form-container">
    
    <div class="form-row">
      <input type="text" id="firstName" placeholder="First Name" required>
      <input type="text" id="lastName" placeholder="Last Name" required>
    </div>

    <input type="email" id="email" placeholder="Email Address" required>
    <input type="password" id="password" placeholder="Password" required>

    <button type="submit" class="btn btn-primary">Sign Up</button>
  </form>

  <p id="message"></p>
</main>

<footer>
  <p>© Alpine Leather</p>
</footer>

<script>
document.getElementById("signupForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const firstName = document.getElementById("firstName").value;
  const lastName = document.getElementById("lastName").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // Create user object
  const user = {
    firstName,
    lastName,
    email,
    password
  };

  // Save to localStorage
  localStorage.setItem("user", JSON.stringify(user));

  // Feedback
  document.getElementById("message").textContent = "Account created successfully!";

  // Optional redirect after 2 sec
  setTimeout(() => {
    window.location.href = "profile.html";
  }, 2000);
});
</script>

</body>
</html>
